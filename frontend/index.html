<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobify · Curated</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --bg:           #09090b;
      --surface:      #0f0f12;
      --border:       #1e1e24;
      --border-hi:    #2e2e38;
      --text-1:       #f0f0f2;
      --text-2:       #9898a8;
      --text-3:       #4e4e62;
      --accent:       #5b5ef4;
      --accent-glow:  rgba(91,94,244,0.18);
      --green:        #34d399;
      --amber:        #fbbf24;
      --red:          #f87171;
      --font-serif:   'Instrument Serif', Georgia, serif;
      --font-mono:    'JetBrains Mono', monospace;
      --font-sans:    'Outfit', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-sans);
      min-height: 100dvh;
    }

    /* Scrollbars */
    * { scrollbar-width: thin; scrollbar-color: #2a2a36 transparent; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a36; border-radius: 3px; }

    /* ── Job row ────────────────────────────────────────────── */
    .job-row {
      position: relative;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .job-row:hover { background: rgba(255,255,255,0.022); }

    /* Left accent stripe on hover */
    .job-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .job-row:hover::before { opacity: 1; }

    /* ── Expandable panel (CSS grid trick) ──────────────────── */
    .expand-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .expand-wrap.open { grid-template-rows: 1fr; }
    .expand-inner { overflow: hidden; }

    /* ── Score badge ────────────────────────────────────────── */
    .score-badge {
      width: 40px; height: 40px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.03em;
      flex-shrink: 0;
    }
    .s-high { background: rgba(245,158,11,0.13); color: #fbbf24; border: 1px solid rgba(245,158,11,0.22); }
    .s-mid  { background: rgba(91,94,244,0.13);  color: #818cf8; border: 1px solid rgba(91,94,244,0.22); }
    .s-low  { background: rgba(78,78,98,0.18);   color: #6b6b88; border: 1px solid rgba(78,78,98,0.25); }
    .s-null { background: rgba(30,30,36,0.8);    color: #3e3e52; border: 1px solid var(--border); }

    /* ── Priority badge ─────────────────────────────────────── */
    .pri-badge {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 4px;
    }
    .pri-high   { background: rgba(248,113,113,0.11); color: #f87171; border: 1px solid rgba(248,113,113,0.22); }
    .pri-medium { background: rgba(251,191,36,0.11);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.22); }
    .pri-low    { background: rgba(78,78,98,0.15);    color: #6b6b88; border: 1px solid rgba(78,78,98,0.22); }

    /* ── Pill tags ──────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 999px;
    }
    .pill-green  { background: rgba(52,211,153,0.09);  color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
    .pill-yellow { background: rgba(251,191,36,0.09);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
    .pill-red    { background: rgba(248,113,113,0.09); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
    .pill-indigo { background: rgba(99,102,241,0.09);  color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-apply {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff;
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: background 0.12s, transform 0.12s, box-shadow 0.12s;
    }
    .btn-apply:hover {
      background: #6366f1;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(91,94,244,0.32);
    }
    .btn-apply:active { transform: scale(0.97); }

    .btn-discard {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 8px;
      background: transparent; color: var(--text-3);
      border: 1px solid var(--border);
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: color 0.12s, border-color 0.12s, background 0.12s, transform 0.12s;
    }
    .btn-discard:hover {
      color: var(--red);
      border-color: rgba(248,113,113,0.3);
      background: rgba(248,113,113,0.07);
    }
    .btn-discard:active { transform: scale(0.97); }

    .btn-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 7px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-3); cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .btn-icon:hover { color: var(--text-2); border-color: var(--border-hi); background: rgba(255,255,255,0.04); }

    /* ── Chevron ────────────────────────────────────────────── */
    .chevron {
      color: var(--text-3); flex-shrink: 0;
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), color 0.12s;
    }
    .chevron.open { transform: rotate(180deg); color: var(--text-2); }

    /* ── Undo Toast ─────────────────────────────────────────── */
    @keyframes toast-up {
      from { opacity: 0; transform: translateX(-50%) translateY(16px) scale(0.96); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
    }
    @keyframes toast-down {
      from { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1); }
      to   { opacity: 0; transform: translateX(-50%) translateY(12px) scale(0.96); }
    }
    .toast-wrap {
      position: fixed; bottom: 28px; left: 50%; z-index: 9999;
      transform: translateX(-50%);
      animation: toast-up 0.32s cubic-bezier(0.34,1.4,0.64,1) forwards;
    }
    .toast-wrap.out { animation: toast-down 0.22s ease forwards; }

    .toast-body {
      display: flex; align-items: center; gap: 16px;
      background: #18181e;
      border: 1px solid #2c2c38;
      border-radius: 14px;
      padding: 14px 18px;
      min-width: 340px; max-width: 500px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
    }

    @keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }
    .toast-bar-track {
      height: 2px; background: #26263a; border-radius: 1px;
      overflow: hidden; margin-top: 7px;
    }
    .toast-bar-fill {
      height: 100%; background: var(--accent); border-radius: 1px;
      animation: drain 5s linear forwards;
    }

    .btn-undo {
      background: none; border: none;
      font-family: var(--font-sans); font-size: 13px; font-weight: 600;
      color: #818cf8; cursor: pointer; white-space: nowrap; padding: 0;
      transition: color 0.1s;
    }
    .btn-undo:hover { color: #a5b4fc; }

    /* ── Skeleton shimmer ───────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -300% 0; }
      100% { background-position:  300% 0; }
    }
    .skel {
      background: linear-gradient(90deg, #18181e 0%, #22222e 50%, #18181e 100%);
      background-size: 300% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 5px;
    }

    /* ── Misc ───────────────────────────────────────────────── */
    .section-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 8px;
    }
    .desc-text {
      font-size: 13px; line-height: 1.72; color: var(--text-2);
      white-space: pre-wrap; max-height: 240px; overflow-y: auto;
    }
    .stat-chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: var(--font-mono);
      font-size: 12px; color: var(--text-2);
    }
    .header-divider {
      color: #28283a; font-size: 20px; line-height: 1; user-select: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Helpers ─────────────────────────────────────────────── */

    function parseList(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val.filter(Boolean);
      try {
        const p = JSON.parse(val);
        return Array.isArray(p) ? p.filter(Boolean) : [String(p)];
      } catch {
        return val.split(',').map(s => s.trim()).filter(Boolean);
      }
    }

    function scoreCls(n) {
      if (n == null) return 's-null';
      if (n >= 8)   return 's-high';
      if (n >= 5)   return 's-mid';
      return 's-low';
    }

    function priCls(p) {
      if (!p) return 'pri-low';
      const lp = p.toLowerCase();
      if (lp === 'high')              return 'pri-high';
      if (lp === 'medium' || lp === 'mid') return 'pri-medium';
      return 'pri-low';
    }

    /* ── Micro-components ────────────────────────────────────── */

    function ScoreBadge({ score }) {
      return (
        <div className={`score-badge ${scoreCls(score)}`}>
          {score ?? '—'}
        </div>
      );
    }

    function PriorityBadge({ priority }) {
      if (!priority) return null;
      return <span className={`pri-badge ${priCls(priority)}`}>{priority}</span>;
    }

    function Pills({ items, variant }) {
      const cls = { green: 'pill-green', yellow: 'pill-yellow', red: 'pill-red', indigo: 'pill-indigo' }[variant] || 'pill-indigo';
      return (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
          {items.map((item, i) => <span key={i} className={`pill ${cls}`}>{item}</span>)}
        </div>
      );
    }

    function FlagGroup({ label, items, variant }) {
      if (!items.length) return null;
      return (
        <div>
          <div className="section-label">{label}</div>
          <Pills items={items} variant={variant} />
        </div>
      );
    }

    /* ── JobDetails (expanded panel) ─────────────────────────── */

    function JobDetails({ job }) {
      const green    = parseList(job.green_flags);
      const yellow   = parseList(job.yellow_flags);
      const red      = parseList(job.red_flags);
      const keywords = parseList(job.keywords_matched);
      const hasFlags = green.length || yellow.length || red.length || keywords.length;

      return (
        <div style={{
          borderTop: '1px solid var(--border)',
          padding: '20px 24px 24px',
        }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 264px', gap: 32 }}>

            {/* Description */}
            <div>
              <div className="section-label">Description</div>
              <div className="desc-text">
                {job.description?.trim() || 'No description provided.'}
              </div>
              {job.notes && (
                <div style={{ marginTop: 18 }}>
                  <div className="section-label">Notes</div>
                  <p style={{ fontSize: 13, color: 'var(--text-2)', fontStyle: 'italic', lineHeight: 1.65 }}>
                    {job.notes}
                  </p>
                </div>
              )}
            </div>

            {/* Flags + keywords */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <FlagGroup label="✓  Green Flags"  items={green}    variant="green" />
              <FlagGroup label="⚠  Yellow Flags" items={yellow}   variant="yellow" />
              <FlagGroup label="✕  Red Flags"    items={red}      variant="red" />
              <FlagGroup label="Keywords"         items={keywords} variant="indigo" />
              {!hasFlags && (
                <p style={{ fontSize: 12, color: 'var(--text-3)' }}>No flags or keywords recorded.</p>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── JobRow ──────────────────────────────────────────────── */

    function JobRow({ job, onDiscard }) {
      const [expanded, setExpanded] = useState(false);

      const handleApply = e => {
        e.stopPropagation();
        if (job.url) window.open(job.url, '_blank', 'noopener,noreferrer');
      };

      const handleDiscard = e => {
        e.stopPropagation();
        onDiscard(job);
      };

      return (
        <div className="job-row" onClick={() => setExpanded(v => !v)}>

          {/* ── Main row ── */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 14,
            padding: '15px 24px',
          }}>
            <ScoreBadge score={job.pre_score} />

            {/* Company + role */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
                <span style={{
                  fontFamily: 'var(--font-serif)',
                  fontSize: 17,
                  color: 'var(--text-1)',
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                }}>
                  {job.company || 'Unknown Company'}
                </span>
                <PriorityBadge priority={job.priority} />
              </div>
              <div style={{
                fontFamily: 'var(--font-mono)',
                fontSize: 11.5, color: 'var(--text-2)',
                overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
              }}>
                {job.role || 'Unknown Role'}
              </div>
            </div>

            {/* Salary + location */}
            <div style={{
              display: 'flex', flexDirection: 'column', alignItems: 'flex-end',
              minWidth: 130, flexShrink: 0,
            }}>
              {job.salary
                ? <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--green)', fontWeight: 500 }}>{job.salary}</span>
                : <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-3)' }}>—</span>
              }
              <span style={{ fontSize: 11.5, color: 'var(--text-3)', marginTop: 3 }}>
                {job.location || 'Remote'}
              </span>
            </div>

            {/* Actions — stop propagation so row click doesn't toggle expand */}
            <div
              style={{ display: 'flex', alignItems: 'center', gap: 7, marginLeft: 6, flexShrink: 0 }}
              onClick={e => e.stopPropagation()}
            >
              <button className="btn-apply" onClick={handleApply} title="Open job link">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                  <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                Apply
              </button>
              <button className="btn-discard" onClick={handleDiscard} title="Discard">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
                Discard
              </button>
            </div>

            {/* Chevron */}
            <svg className={`chevron ${expanded ? 'open' : ''}`}
                 width="14" height="14" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

          {/* ── Expanded details ── */}
          <div className={`expand-wrap ${expanded ? 'open' : ''}`}>
            <div className="expand-inner">
              <JobDetails job={job} />
            </div>
          </div>
        </div>
      );
    }

    /* ── UndoToast ───────────────────────────────────────────── */

    function UndoToast({ job, onUndo, onDone }) {
      const [out, setOut] = useState(false);
      const timerRef = useRef(null);

      const dismiss = useCallback(() => {
        setOut(true);
        setTimeout(onDone, 240);
      }, [onDone]);

      useEffect(() => {
        timerRef.current = setTimeout(dismiss, 5000);
        return () => clearTimeout(timerRef.current);
      }, [dismiss]);

      const handleUndo = () => {
        clearTimeout(timerRef.current);
        setOut(true);
        // slight delay so exit animation plays before restoring
        setTimeout(onUndo, 180);
      };

      return (
        <div className={`toast-wrap ${out ? 'out' : ''}`}>
          <div className="toast-body">
            {/* Icon */}
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="var(--red)" strokeWidth="2" strokeLinecap="round" style={{ flexShrink: 0 }}>
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
            </svg>

            {/* Text + bar */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <p style={{ fontSize: 13, color: 'var(--text-1)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                <strong style={{ fontWeight: 500 }}>{job.role}</strong>
                <span style={{ color: 'var(--text-2)' }}> at {job.company}</span>
                <span style={{ color: 'var(--text-3)' }}> discarded</span>
              </p>
              <div className="toast-bar-track">
                <div className="toast-bar-fill" />
              </div>
            </div>

            <button className="btn-undo" onClick={handleUndo}>Undo</button>
          </div>
        </div>
      );
    }

    /* ── Loading skeleton ────────────────────────────────────── */

    function SkeletonRow() {
      return (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 14,
          padding: '15px 24px', borderBottom: '1px solid var(--border)',
        }}>
          <div className="skel" style={{ width: 40, height: 40, borderRadius: 9, flexShrink: 0 }} />
          <div style={{ flex: 1 }}>
            <div className="skel" style={{ height: 15, width: '38%', marginBottom: 8 }} />
            <div className="skel" style={{ height: 11, width: '54%' }} />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
            <div className="skel" style={{ height: 12, width: 88 }} />
            <div className="skel" style={{ height: 11, width: 64 }} />
          </div>
          <div style={{ display: 'flex', gap: 7, marginLeft: 6 }}>
            <div className="skel" style={{ height: 30, width: 70, borderRadius: 8 }} />
            <div className="skel" style={{ height: 30, width: 76, borderRadius: 8 }} />
          </div>
          <div className="skel" style={{ width: 14, height: 14, flexShrink: 0 }} />
        </div>
      );
    }

    /* ── Empty state ─────────────────────────────────────────── */

    function EmptyState() {
      return (
        <div style={{
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          padding: '96px 24px', textAlign: 'center',
        }}>
          <p style={{ fontFamily: 'var(--font-serif)', fontStyle: 'italic', fontSize: 44, color: '#28283a', marginBottom: 12 }}>
            All clear.
          </p>
          <p style={{ fontSize: 13, color: 'var(--text-3)' }}>No curated jobs pending review.</p>
          <p style={{ fontSize: 12, color: '#2c2c3a', marginTop: 6 }}>
            Run the scraper to bring in new opportunities.
          </p>
        </div>
      );
    }

    /* ── App ─────────────────────────────────────────────────── */

    function App() {
      const [jobs, setJobs]       = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError]     = useState(null);
      const [toast, setToast]     = useState(null); // { job }

      const fetchJobs = async () => {
        setLoading(true); setError(null);
        try {
          const res = await fetch('/api/jobs');
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          setJobs(await res.json());
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { fetchJobs(); }, []);

      const handleDiscard = (job) => {
        // Optimistic remove
        setJobs(prev => prev.filter(j => j.id !== job.id));
        // Immediately write to DB — undo will call restore endpoint
        fetch(`/api/jobs/${job.id}/discard`, { method: 'PATCH' }).catch(console.error);
        // Replace existing toast (previous discard already committed)
        setToast({ job });
      };

      const handleUndo = () => {
        if (!toast) return;
        const { job } = toast;
        setToast(null);
        fetch(`/api/jobs/${job.id}/restore`, { method: 'PATCH' }).catch(console.error);
        setJobs(prev =>
          [...prev, job].sort((a, b) => (b.pre_score ?? 0) - (a.pre_score ?? 0))
        );
      };

      const handleToastDone = () => setToast(null);

      return (
        <>
          {/* ── Header ── */}
          <header style={{
            position: 'sticky', top: 0, zIndex: 40,
            borderBottom: '1px solid var(--border)',
            backdropFilter: 'blur(14px)',
            background: 'rgba(9,9,11,0.86)',
          }}>
            <div style={{
              maxWidth: 920, margin: '0 auto',
              padding: '13px 24px',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
                <span style={{ fontFamily: 'var(--font-serif)', fontSize: 22, letterSpacing: '-0.02em', color: 'var(--text-1)' }}>
                  Jobify
                </span>
                <span className="header-divider">·</span>
                <span style={{ fontSize: 13, color: 'var(--text-3)', fontWeight: 400 }}>Curated</span>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                {!loading && !error && (
                  <div className="stat-chip">{jobs.length} pending</div>
                )}
                <button
                  className="btn-icon"
                  onClick={fetchJobs}
                  title="Refresh"
                  style={{ width: 'auto', padding: '5px 10px', gap: 6, fontSize: 12, fontFamily: 'var(--font-sans)', color: 'var(--text-3)' }}
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                  </svg>
                  Refresh
                </button>
              </div>
            </div>
          </header>

          {/* ── Main ── */}
          <main style={{ maxWidth: 920, margin: '0 auto' }}>
            {error && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '20px 24px' }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2" strokeLinecap="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span style={{ fontSize: 13, color: 'var(--red)' }}>
                  {error} — make sure the API is running:{' '}
                  <code style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: '#f87171aa' }}>
                    uvicorn api:app --reload
                  </code>
                </span>
              </div>
            )}

            {loading
              ? Array.from({ length: 7 }).map((_, i) => <SkeletonRow key={i} />)
              : !error && jobs.length === 0
                ? <EmptyState />
                : jobs.map(job => (
                    <JobRow
                      key={job.id}
                      job={job}
                      onDiscard={handleDiscard}
                    />
                  ))
            }
          </main>

          {/* ── Toast ── */}
          {toast && (
            <UndoToast
              key={toast.job.id}
              job={toast.job}
              onUndo={handleUndo}
              onDone={handleToastDone}
            />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
